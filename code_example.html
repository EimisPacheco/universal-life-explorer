<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Human Anatomy - Hyperrealistic Organ Visualization</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #e0e0e0;
        }
        #canvas-container { width: 100vw; height: 100vh; }
        canvas { display: block; }

        /* UI Panel */
        #ui-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 300px;
            background: rgba(10, 10, 20, 0.92);
            border: 1px solid rgba(100, 140, 200, 0.3);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(20px);
            z-index: 100;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }
        #ui-panel::-webkit-scrollbar { width: 4px; }
        #ui-panel::-webkit-scrollbar-track { background: transparent; }
        #ui-panel::-webkit-scrollbar-thumb { background: rgba(100,140,200,0.3); border-radius: 2px; }

        #ui-panel h1 {
            font-size: 18px;
            font-weight: 600;
            color: #7eb8ff;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }
        #ui-panel .subtitle {
            font-size: 11px;
            color: #6a7a8a;
            margin-bottom: 16px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .control-group {
            margin-bottom: 14px;
        }
        .control-group label {
            display: block;
            font-size: 11px;
            color: #8a9aaa;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type="range"] {
            -webkit-appearance: none;
            flex: 1;
            height: 4px;
            background: rgba(100, 140, 200, 0.2);
            border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #7eb8ff;
            border-radius: 50%;
            cursor: pointer;
        }
        .slider-value {
            font-size: 12px;
            color: #7eb8ff;
            min-width: 35px;
            text-align: right;
        }

        .organ-list {
            list-style: none;
        }
        .organ-list li {
            padding: 8px 12px;
            margin: 2px 0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .organ-list li:hover {
            background: rgba(100, 140, 200, 0.15);
        }
        .organ-list li.active {
            background: rgba(100, 140, 200, 0.25);
            color: #7eb8ff;
        }
        .organ-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .organ-toggle {
            margin-left: auto;
            width: 32px;
            height: 18px;
            background: rgba(100, 140, 200, 0.2);
            border-radius: 9px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }
        .organ-toggle.on {
            background: rgba(100, 180, 255, 0.5);
        }
        .organ-toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 14px;
            height: 14px;
            background: #ccc;
            border-radius: 50%;
            transition: all 0.2s;
        }
        .organ-toggle.on::after {
            left: 16px;
            background: #7eb8ff;
        }

        /* Info panel */
        #info-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 320px;
            background: rgba(10, 10, 20, 0.92);
            border: 1px solid rgba(100, 140, 200, 0.3);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(20px);
            z-index: 100;
            display: none;
        }
        #info-panel h2 {
            font-size: 16px;
            color: #7eb8ff;
            margin-bottom: 8px;
        }
        #info-panel p {
            font-size: 12px;
            line-height: 1.6;
            color: #9aaabc;
        }
        #info-panel .close-btn {
            position: absolute;
            top: 12px;
            right: 14px;
            background: none;
            border: none;
            color: #6a7a8a;
            font-size: 18px;
            cursor: pointer;
        }

        /* Loading */
        #loading {
            position: fixed;
            inset: 0;
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .loading-text {
            font-size: 14px;
            color: #7eb8ff;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .loading-bar {
            width: 200px;
            height: 2px;
            background: rgba(100, 140, 200, 0.2);
            margin-top: 16px;
            border-radius: 1px;
            overflow: hidden;
        }
        .loading-bar-fill {
            height: 100%;
            background: #7eb8ff;
            width: 0%;
            transition: width 0.3s;
        }

        .section-divider {
            height: 1px;
            background: rgba(100, 140, 200, 0.15);
            margin: 14px 0;
        }

        .btn-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 6px 12px;
            border: 1px solid rgba(100, 140, 200, 0.3);
            background: rgba(100, 140, 200, 0.1);
            color: #8ab4e0;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover {
            background: rgba(100, 140, 200, 0.25);
            border-color: rgba(100, 140, 200, 0.5);
        }
        .btn.active {
            background: rgba(100, 180, 255, 0.3);
            border-color: #7eb8ff;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loading-text">Loading Anatomy Model</div>
        <div class="loading-bar"><div class="loading-bar-fill" id="loading-fill"></div></div>
    </div>

    <div id="canvas-container"></div>

    <div id="ui-panel">
        <h1>Human Anatomy</h1>
        <div class="subtitle">Interactive 3D Visualization</div>

        <div class="control-group">
            <label>View Mode</label>
            <div class="btn-group">
                <button class="btn active" data-view="full">Full Body</button>
                <button class="btn" data-view="torso">Torso</button>
                <button class="btn" data-view="head">Head</button>
            </div>
        </div>

        <div class="control-group">
            <label>Skin Opacity</label>
            <div class="slider-container">
                <input type="range" id="skin-opacity" min="0" max="100" value="30">
                <span class="slider-value" id="skin-opacity-val">30%</span>
            </div>
        </div>

        <div class="control-group">
            <label>Muscle Layer</label>
            <div class="slider-container">
                <input type="range" id="muscle-opacity" min="0" max="100" value="20">
                <span class="slider-value" id="muscle-opacity-val">20%</span>
            </div>
        </div>

        <div class="section-divider"></div>

        <div class="control-group">
            <label>Organ Systems</label>
            <ul class="organ-list" id="organ-list">
                <!-- Populated by JS -->
            </ul>
        </div>
    </div>

    <div id="info-panel">
        <button class="close-btn" onclick="document.getElementById('info-panel').style.display='none'">&times;</button>
        <h2 id="info-title">Organ</h2>
        <p id="info-desc">Description</p>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { SMAAPass } from 'three/addons/postprocessing/SMAAPass.js';

        // ============================================================
        // SCENE SETUP
        // ============================================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x080810);
        scene.fog = new THREE.FogExp2(0x080810, 0.008);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 18);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Post-processing
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            0.3, 0.4, 0.85
        );
        composer.addPass(bloomPass);
        const smaaPass = new SMAAPass(window.innerWidth, window.innerHeight);
        composer.addPass(smaaPass);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 5;
        controls.maxDistance = 40;
        controls.target.set(0, 5, 0);
        controls.maxPolarAngle = Math.PI * 0.95;

        // ============================================================
        // LIGHTING — Cinematic Medical Visualization
        // ============================================================
        const ambientLight = new THREE.AmbientLight(0x1a2040, 0.6);
        scene.add(ambientLight);

        const mainLight = new THREE.DirectionalLight(0xdce8ff, 2.5);
        mainLight.position.set(8, 15, 10);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.set(2048, 2048);
        mainLight.shadow.camera.near = 0.1;
        mainLight.shadow.camera.far = 50;
        mainLight.shadow.camera.left = -15;
        mainLight.shadow.camera.right = 15;
        mainLight.shadow.camera.top = 20;
        mainLight.shadow.camera.bottom = -5;
        mainLight.shadow.bias = -0.001;
        scene.add(mainLight);

        const fillLight = new THREE.DirectionalLight(0x4060a0, 1.0);
        fillLight.position.set(-6, 8, -5);
        scene.add(fillLight);

        const rimLight = new THREE.DirectionalLight(0x6090ff, 1.5);
        rimLight.position.set(-3, 5, -10);
        scene.add(rimLight);

        const topLight = new THREE.PointLight(0xc0d0ff, 1.5, 30);
        topLight.position.set(0, 18, 0);
        scene.add(topLight);

        const underLight = new THREE.PointLight(0x302010, 0.5, 15);
        underLight.position.set(0, -2, 3);
        scene.add(underLight);

        // Subtle colored rim lights for depth
        const warmRim = new THREE.PointLight(0xff6040, 0.4, 20);
        warmRim.position.set(5, 6, -5);
        scene.add(warmRim);

        // Ground plane with subtle gradient
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshStandardMaterial({
            color: 0x0a0a12,
            roughness: 0.95,
            metalness: 0.05
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);

        // ============================================================
        // MATERIAL FACTORY
        // ============================================================
        function createOrganMaterial(color, opts = {}) {
            return new THREE.MeshPhysicalMaterial({
                color: new THREE.Color(color),
                roughness: opts.roughness ?? 0.45,
                metalness: opts.metalness ?? 0.02,
                clearcoat: opts.clearcoat ?? 0.3,
                clearcoatRoughness: opts.clearcoatRoughness ?? 0.4,
                transmission: opts.transmission ?? 0,
                thickness: opts.thickness ?? 0,
                ior: opts.ior ?? 1.4,
                sheen: opts.sheen ?? 0.5,
                sheenRoughness: opts.sheenRoughness ?? 0.6,
                sheenColor: new THREE.Color(opts.sheenColor ?? color),
                emissive: new THREE.Color(opts.emissive ?? color),
                emissiveIntensity: opts.emissiveIntensity ?? 0.02,
                side: opts.side ?? THREE.FrontSide,
                transparent: opts.transparent ?? false,
                opacity: opts.opacity ?? 1.0,
                depthWrite: opts.depthWrite ?? true,
            });
        }

        // ============================================================
        // BODY REFERENCE CONSTANTS
        // ============================================================
        const BODY_CENTER_Y = 5.0; // approximate navel height
        const HEAD_Y = 10.2;

        // ============================================================
        // ORGAN DATA STORE
        // ============================================================
        const organs = {};
        const organInfo = {
            brain: {
                name: 'Brain',
                color: '#e8a0b0',
                desc: 'The brain is the central organ of the nervous system, weighing about 1.4 kg. It contains approximately 86 billion neurons and is responsible for cognition, memory, emotion, motor control, sensory processing, and regulation of virtually all body functions.'
            },
            heart: {
                name: 'Heart',
                color: '#c0283c',
                desc: 'A muscular organ roughly the size of a closed fist, the heart pumps blood through the circulatory system. It beats approximately 100,000 times per day, pumping about 7,500 liters of blood. The heart has four chambers: two atria and two ventricles.'
            },
            leftLung: {
                name: 'Left Lung',
                color: '#d4758a',
                desc: 'The left lung is slightly smaller than the right to accommodate the heart. It has two lobes (superior and inferior). The lungs perform gas exchange, taking in oxygen and releasing carbon dioxide through approximately 300 million alveoli.'
            },
            rightLung: {
                name: 'Right Lung',
                color: '#d4758a',
                desc: 'The right lung has three lobes (superior, middle, and inferior) and is slightly larger than the left lung. Together, the lungs process about 10,000 liters of air per day.'
            },
            liver: {
                name: 'Liver',
                color: '#8B3A2A',
                desc: 'The liver is the largest internal organ, weighing about 1.5 kg. It performs over 500 vital functions including detoxification, protein synthesis, bile production, and glycogen storage. It has two main lobes and receives blood from both the hepatic artery and portal vein.'
            },
            stomach: {
                name: 'Stomach',
                color: '#c97a6a',
                desc: 'The stomach is a J-shaped muscular organ that holds food and begins protein digestion through hydrochloric acid and enzymes (pepsin). It can expand to hold about 1 liter of food and churns contents into chyme.'
            },
            kidneyLeft: {
                name: 'Left Kidney',
                color: '#8B4538',
                desc: 'Each kidney is about 11 cm long and filters approximately 180 liters of blood per day, producing 1-2 liters of urine. Kidneys regulate fluid balance, electrolytes, blood pressure, and produce hormones like erythropoietin.'
            },
            kidneyRight: {
                name: 'Right Kidney',
                color: '#8B4538',
                desc: 'The right kidney sits slightly lower than the left due to the liver above it. Each kidney contains about 1 million nephrons, the functional filtering units.'
            },
            spleen: {
                name: 'Spleen',
                color: '#6B2040',
                desc: 'The spleen is the largest lymphoid organ, about 12 cm long. It filters blood, recycles old red blood cells, and stores white blood cells and platelets. It plays a key role in immune defense against bacteria.'
            },
            pancreas: {
                name: 'Pancreas',
                color: '#d4a574',
                desc: 'The pancreas is a 15 cm long gland behind the stomach. It serves dual functions: exocrine (producing digestive enzymes like lipase, amylase, and trypsin) and endocrine (producing insulin and glucagon for blood sugar regulation).'
            },
            smallIntestine: {
                name: 'Small Intestine',
                color: '#d49a8a',
                desc: 'The small intestine is about 6 meters long with three sections: duodenum, jejunum, and ileum. It is the primary site of nutrient absorption, with villi and microvilli increasing the surface area to approximately 250 square meters.'
            },
            largeIntestine: {
                name: 'Large Intestine',
                color: '#b07868',
                desc: 'The large intestine (colon) is about 1.5 meters long. It absorbs water and electrolytes, and houses trillions of beneficial bacteria that produce vitamins and aid digestion. It includes the cecum, ascending, transverse, descending, and sigmoid colon.'
            },
            bladder: {
                name: 'Bladder',
                color: '#c49070',
                desc: 'The urinary bladder is a hollow muscular organ that stores urine. It can hold 400-600 mL of urine. The detrusor muscle contracts during urination, controlled by both voluntary and involuntary nervous systems.'
            },
            trachea: {
                name: 'Trachea',
                color: '#c4a0a0',
                desc: 'The trachea (windpipe) is a 10-12 cm tube reinforced by 16-20 C-shaped cartilage rings. It carries air between the larynx and the bronchi, and is lined with ciliated epithelium that moves mucus and trapped particles upward.'
            },
            esophagus: {
                name: 'Esophagus',
                color: '#c08878',
                desc: 'The esophagus is a 25 cm muscular tube connecting the pharynx to the stomach. It uses peristaltic contractions to move food downward, and sphincters at both ends prevent backflow.'
            },
            spine: {
                name: 'Spinal Column',
                color: '#e8e0d0',
                desc: 'The spinal column consists of 33 vertebrae (7 cervical, 12 thoracic, 5 lumbar, 5 fused sacral, and 4 fused coccygeal). It protects the spinal cord, supports the head, and provides structural support and flexibility.'
            },
            ribcage: {
                name: 'Rib Cage',
                color: '#e0d8c8',
                desc: 'The rib cage consists of 12 pairs of ribs, the sternum, and thoracic vertebrae. It protects the heart, lungs, and other vital organs. The first 7 pairs are true ribs (attached to sternum), pairs 8-10 are false ribs, and pairs 11-12 are floating ribs.'
            },
            diaphragm: {
                name: 'Diaphragm',
                color: '#b86858',
                desc: 'The diaphragm is a dome-shaped skeletal muscle that separates the thoracic and abdominal cavities. It is the primary muscle of respiration, contracting and flattening during inhalation to create negative pressure in the thorax.'
            },
            aorta: {
                name: 'Aorta',
                color: '#cc2233',
                desc: 'The aorta is the largest artery in the body, about 30 cm long and 2.5 cm in diameter. It carries oxygenated blood from the left ventricle to the rest of the body. It arches over the heart and descends through the thorax and abdomen.'
            },
            thyroid: {
                name: 'Thyroid Gland',
                color: '#c46060',
                desc: 'The thyroid is a butterfly-shaped gland in the neck weighing 15-20g. It produces T3 and T4 hormones that regulate metabolism, heart rate, body temperature, and growth. It also produces calcitonin for calcium regulation.'
            },
            gallbladder: {
                name: 'Gallbladder',
                color: '#5a8a3a',
                desc: 'The gallbladder is a small pear-shaped organ about 8 cm long, located beneath the liver. It stores and concentrates bile produced by the liver, releasing it into the duodenum to aid in fat digestion.'
            },
            adrenals: {
                name: 'Adrenal Glands',
                color: '#c8a848',
                desc: 'The adrenal glands sit atop each kidney. They produce hormones including cortisol (stress response), aldosterone (blood pressure), and adrenaline (fight-or-flight response). Each gland has a cortex and medulla with distinct functions.'
            },
        };

        // ============================================================
        // GEOMETRY HELPER FUNCTIONS
        // ============================================================

        // Create a smooth parametric surface of revolution (lathe-like but smoother)
        function createOrganLathe(profile, segments = 64, phiLength = Math.PI * 2) {
            const points = profile.map(p => new THREE.Vector2(p[0], p[1]));
            const geo = new THREE.LatheGeometry(points, segments, 0, phiLength);
            geo.computeVertexNormals();
            return geo;
        }

        // Create a deformed sphere (ellipsoid with noise)
        function createOrganicSphere(rx, ry, rz, detail = 48, deform = 0.0, seed = 0) {
            const geo = new THREE.SphereGeometry(1, detail, detail);
            const pos = geo.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                let x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
                // Noise-like deformation
                let noise = 0;
                if (deform > 0) {
                    noise = Math.sin(x * 5.1 + seed) * Math.cos(y * 4.3 + seed * 0.7) * Math.sin(z * 3.7 + seed * 1.3) * deform;
                    noise += Math.sin(x * 11 + seed * 2) * Math.cos(y * 9 + seed) * 0.3 * deform;
                }
                pos.setXYZ(i, x * rx * (1 + noise), y * ry * (1 + noise), z * rz * (1 + noise));
            }
            geo.computeVertexNormals();
            return geo;
        }

        // Create a tube along a 3D curve
        function createTube(points, radius = 0.1, segments = 64, radialSegs = 12) {
            const curve = new THREE.CatmullRomCurve3(points.map(p => new THREE.Vector3(...p)));
            return new THREE.TubeGeometry(curve, segments, radius, radialSegs, false);
        }

        // Create a torus-like shape for intestines
        function createCoiledTube(centerX, centerY, centerZ, majorR, minorR, coils, tubeR, pointsPerCoil = 24) {
            const pts = [];
            const totalPts = coils * pointsPerCoil;
            for (let i = 0; i <= totalPts; i++) {
                const t = i / totalPts;
                const angle = t * coils * Math.PI * 2;
                const x = centerX + (majorR + minorR * Math.cos(angle * 3.7)) * Math.cos(angle);
                const z = centerZ + (majorR + minorR * Math.cos(angle * 3.7)) * Math.sin(angle);
                const y = centerY + t * 0.8 - 0.4 + Math.sin(angle * 2.3) * 0.1;
                pts.push([x, y, z]);
            }
            return createTube(pts, tubeR, totalPts * 2, 8);
        }

        // ============================================================
        // BUILD ORGANS
        // ============================================================
        const bodyGroup = new THREE.Group();
        scene.add(bodyGroup);

        function addOrgan(id, geometry, material, position, rotation, scale) {
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(...position);
            if (rotation) mesh.rotation.set(...rotation);
            if (scale) {
                if (Array.isArray(scale)) mesh.scale.set(...scale);
                else mesh.scale.setScalar(scale);
            }
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.userData.organId = id;
            bodyGroup.add(mesh);
            organs[id] = mesh;
            return mesh;
        }

        function addOrganGroup(id, meshes) {
            const group = new THREE.Group();
            meshes.forEach(m => group.add(m));
            group.userData.organId = id;
            bodyGroup.add(group);
            organs[id] = group;
            return group;
        }

        // --------------- BRAIN ---------------
        (function buildBrain() {
            const brainMat = createOrganMaterial('#e8a0b0', {
                roughness: 0.6, clearcoat: 0.2, sheen: 0.8,
                sheenColor: '#f0c0c8', emissiveIntensity: 0.03
            });
            // Main brain hemispheres
            const leftHemi = new THREE.Mesh(
                createOrganicSphere(0.65, 0.55, 0.6, 48, 0.08, 1),
                brainMat
            );
            leftHemi.position.set(-0.32, HEAD_Y + 0.6, -0.1);

            const rightHemi = new THREE.Mesh(
                createOrganicSphere(0.65, 0.55, 0.6, 48, 0.08, 2),
                brainMat
            );
            rightHemi.position.set(0.32, HEAD_Y + 0.6, -0.1);

            // Cerebellum
            const cerebellumMat = createOrganMaterial('#d08898', {
                roughness: 0.65, sheen: 0.6
            });
            const cerebellum = new THREE.Mesh(
                createOrganicSphere(0.45, 0.3, 0.35, 32, 0.1, 3),
                cerebellumMat
            );
            cerebellum.position.set(0, HEAD_Y + 0.15, -0.5);

            // Brain stem
            const stemGeo = createTube([
                [0, HEAD_Y + 0.1, -0.35],
                [0, HEAD_Y - 0.2, -0.3],
                [0, HEAD_Y - 0.5, -0.2],

        (function buildHeart() {

            // Heart shape using parametric approach
            const heartGeo = new THREE.SphereGeometry(1, 48, 48);
            const pos = heartGeo.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                let x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
                // Heart shape deformation
                const r = Math.sqrt(x*x + y*y + z*z);
                const theta = Math.atan2(z, x);
                const phi = Math.acos(y / (r || 1));

                // Top indent for aorta region
                if (y > 0.3) {
                    const indent = Math.max(0, (y - 0.3) * 0.6) * Math.cos(theta * 2) * 0.3;

                    const squeeze = 1 - Math.max(0, (-0.2 - y)) * 0.5;
                    x *= squeeze;
                    z *= squeeze;
                }
                // General heart shape
                const heartScale = 0.55;
                pos.setXYZ(i, x * 0.5 * heartScale, y * 0.6 * heartScale, z * 0.45 * heartScale);
            }
            heartGeo.computeVertexNormals();

            const heart = new THREE.Mesh(heartGeo, heartMat);

                pts.push([x, y, z]);

            const siGeo = createTube(pts, 0.06, pts.length * 2, 8);

            si.castShadow = true;
            si.userData.organId = 'smallIntestine';

                [0.0, 3.0, 0.3],
            ];

            const liGeo = createTube(liPts, 0.14, 64, 12);

            // Add haustra (bulges) effect via vertex deformation
            const pos = liGeo.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
                const bulge = Math.sin(y * 12) * 0.015 + Math.sin(y * 20 + x * 15) * 0.008;
                const len = Math.sqrt(x*x + z*z);
                if (len > 0.05) {
                    pos.setX(i, x + (x / len) * bulge);
                    pos.setZ(i, z + (z / len) * bulge);
                }
            }
            liGeo.computeVertexNormals();

            const li = new THREE.Mesh(liGeo, liMat);
            li.castShadow = true;

            // Appendix
            const appGeo = createTube([
                [0.8, 2.8, 0.3],
                [0.9, 2.6, 0.4],
                [0.85, 2.4, 0.45],
                [0.75, 2.3, 0.4],
            ], 0.03, 16, 6);
            const appendix = new THREE.Mesh(appGeo, liMat);

            const group = new THREE.Group();
            group.add(li, appendix);
            group.userData.organId = 'largeIntestine';
            bodyGroup.add(group);
            organs.largeIntestine = group;
        })();

        // --------------- BLADDER ---------------
        (function buildBladder() {
            const bladMat = createOrganMaterial('#c49070', {
                roughness: 0.5, clearcoat: 0.3,
                sheen: 0.4, sheenColor: '#d4a080',
                transmission: 0.05, thickness: 0.3
            });
            const bladGeo = createOrganicSphere(0.25, 0.2, 0.2, 32, 0.03, 14);
            const blad = new THREE.Mesh(bladGeo, bladMat);
            blad.position.set(0, 2.8, 0.5);
            blad.castShadow = true;
            blad.userData.organId = 'bladder';
            bodyGroup.add(blad);
            organs.bladder = blad;
        })();

        // --------------- SPINE ---------------
        (function buildSpine() {
            const boneMat = createOrganMaterial('#e8e0d0', {
                roughness: 0.7, metalness: 0.05,
                clearcoat: 0.1, sheen: 0.2
            });
            const discMat = createOrganMaterial('#a0b0c0', {
                roughness: 0.6, clearcoat: 0.2
            });

            const spineGroup = new THREE.Group();

            // Vertebrae along spine
            const vertebraeCount = 24;
            for (let i = 0; i < vertebraeCount; i++) {
                const t = i / vertebraeCount;
                const y = 10.2 - t * 8.0;

                // Spinal curve (lordosis/kyphosis)
                let z = -0.3;
                if (t < 0.3) z += Math.sin(t / 0.3 * Math.PI) * 0.15; // cervical
                else if (t < 0.6) z -= Math.sin((t - 0.3) / 0.3 * Math.PI) * 0.1; // thoracic
                else z += Math.sin((t - 0.6) / 0.4 * Math.PI) * 0.12; // lumbar

                // Vertebral body
                const vSize = 0.12 + t * 0.08; // vertebrae get larger going down
                const vertGeo = new THREE.CylinderGeometry(vSize, vSize * 1.05, 0.15, 8);
                const vert = new THREE.Mesh(vertGeo, boneMat);
                vert.position.set(0, y, z);

                // Spinous process
                const spinousGeo = new THREE.BoxGeometry(0.03, 0.08, 0.15);
                const spinous = new THREE.Mesh(spinousGeo, boneMat);
                spinous.position.set(0, y, z - vSize - 0.05);

                // Transverse processes
                const tpGeo = new THREE.BoxGeometry(0.18 + t * 0.06, 0.04, 0.04);
                const tp = new THREE.Mesh(tpGeo, boneMat);
                tp.position.set(0, y, z - 0.03);

                // Disc
                if (i < vertebraeCount - 1) {
                    const discGeo = new THREE.CylinderGeometry(vSize * 0.95, vSize * 0.95, 0.06, 8);
                    const disc = new THREE.Mesh(discGeo, discMat);
                    disc.position.set(0, y - 0.1, z);
                    spineGroup.add(disc);
                }

                spineGroup.add(vert, spinous, tp);
            }

            // Sacrum
            const sacrumGeo = new THREE.ConeGeometry(0.2, 0.5, 8);
            const sacrum = new THREE.Mesh(sacrumGeo, boneMat);
            sacrum.position.set(0, 2.0, -0.15);
            sacrum.rotation.x = Math.PI;
            spineGroup.add(sacrum);

            spineGroup.userData.organId = 'spine';
            bodyGroup.add(spineGroup);
            organs.spine = spineGroup;
        })();

        // --------------- RIB CAGE ---------------
        (function buildRibcage() {
            const boneMat = createOrganMaterial('#e0d8c8', {
                roughness: 0.7, metalness: 0.05,
                clearcoat: 0.1, sheen: 0.2
            });

            const ribGroup = new THREE.Group();

            // 12 pairs of ribs
            for (let pair = 0; pair < 12; pair++) {
                const t = pair / 12;
                const y = 8.8 - pair * 0.32;
                const ribLength = 0.7 + Math.sin(t * Math.PI) * 0.9; // ribs get wider then narrower
                const ribDepth = 0.3 + Math.sin(t * Math.PI) * 0.4;

                for (let side = -1; side <= 1; side += 2) {
                    const ribPts = [];
                    const steps = 20;
                    for (let s = 0; s <= steps; s++) {
                        const st = s / steps;
                        const angle = st * Math.PI * 0.8;
                        const x = side * Math.sin(angle) * ribLength;
                        const ry = y - Math.sin(angle) * 0.15 - st * 0.1;
                        const rz = -0.2 + Math.cos(angle) * ribDepth;
                        ribPts.push([x, ry, rz]);
                    }
                    // Connect to sternum for true ribs (first 7)
                    if (pair < 7) {
                        const lastPt = ribPts[ribPts.length - 1];
                        ribPts.push([lastPt[0] * 0.7, lastPt[1] + 0.1, lastPt[2] + 0.2]);
                        ribPts.push([side * 0.1, lastPt[1] + 0.15, 0.3]);
                    }

                    const ribGeo = createTube(ribPts, 0.035, steps * 2, 6);
                    const rib = new THREE.Mesh(ribGeo, boneMat);
                    rib.castShadow = true;
                    ribGroup.add(rib);
                }
            }

            // Sternum
            const sternumGeo = createTube([
                [0, 9.0, 0.5],
                [0, 8.6, 0.52],
                [0, 8.0, 0.53],
                [0, 7.5, 0.52],
                [0, 7.0, 0.48],
                [0, 6.7, 0.42],
            ], 0.06, 24, 8);
            const sternum = new THREE.Mesh(sternumGeo, boneMat);
            ribGroup.add(sternum);

            // Clavicles
            for (let side = -1; side <= 1; side += 2) {
                const clavGeo = createTube([
                    [0, 9.3, 0.4],
                    [side * 0.5, 9.25, 0.2],
                    [side * 1.0, 9.15, 0.0],
                    [side * 1.3, 9.1, -0.1],
                ], 0.04, 16, 6);
                const clav = new THREE.Mesh(clavGeo, boneMat);
                ribGroup.add(clav);
            }

            ribGroup.userData.organId = 'ribcage';
            bodyGroup.add(ribGroup);
            organs.ribcage = ribGroup;
        })();

        // ============================================================
        // SKIN / BODY SILHOUETTE (Semi-transparent)
        // ============================================================
        let skinMesh, muscleMesh;
        (function buildBody() {
            // Body profile for lathe
            const bodyProfile = [
                // Head
                [0.0, 11.5], [0.25, 11.4], [0.45, 11.2], [0.55, 10.9],
                [0.6, 10.5], [0.58, 10.1], [0.52, 9.8],
                // Neck
                [0.3, 9.6], [0.28, 9.4], [0.3, 9.2],
                // Shoulders
                [0.6, 9.15], [1.0, 9.1], [1.4, 9.0], [1.6, 8.9],
                // Upper arm start
                [1.55, 8.7], [1.45, 8.4],
                // Torso
                [1.25, 8.2], [1.15, 7.8], [1.05, 7.4], [1.0, 7.0],
                // Waist
                [0.95, 6.5], [0.92, 6.0], [0.95, 5.5],
                // Hips
                [1.05, 5.0], [1.1, 4.5], [1.08, 4.0],
                // Upper leg
                [0.9, 3.5], [0.75, 3.0], [0.65, 2.5],
                // Knee
                [0.55, 2.0], [0.52, 1.7],
                // Lower leg
                [0.5, 1.5], [0.48, 1.2], [0.42, 0.8],
                // Ankle
                [0.35, 0.4], [0.3, 0.2], [0.28, 0.1],
                // Foot
                [0.3, 0.0], [0.0, 0.0]
            ];

            const skinGeo = createOrganLathe(bodyProfile, 64);

            // Skin material - translucent
            const skinMat = new THREE.MeshPhysicalMaterial({
                color: 0xf5d0b5,
                roughness: 0.6,
                metalness: 0.0,
                clearcoat: 0.1,
                clearcoatRoughness: 0.5,
                transmission: 0.3,
                thickness: 2.0,
                ior: 1.38,
                sheen: 0.3,
                sheenRoughness: 0.5,
                sheenColor: new THREE.Color(0xffa090),
                transparent: true,
                opacity: 0.3,
                side: THREE.DoubleSide,
                depthWrite: false,
            });

            skinMesh = new THREE.Mesh(skinGeo, skinMat);
            skinMesh.castShadow = false;
            skinMesh.receiveShadow = true;
            bodyGroup.add(skinMesh);

            // Muscle layer
            const muscleProfile = bodyProfile.map(p => [p[0] * 0.97, p[1]]);
            const muscleGeo = createOrganLathe(muscleProfile, 48);
            const muscleMat = new THREE.MeshPhysicalMaterial({
                color: 0xb04040,
                roughness: 0.65,
                metalness: 0.02,
                clearcoat: 0.2,
                sheen: 0.4,
                sheenColor: new THREE.Color(0xc05050),
                transparent: true,
                opacity: 0.2,
                side: THREE.DoubleSide,
                depthWrite: false,
            });
            muscleMesh = new THREE.Mesh(muscleGeo, muscleMat);
            bodyGroup.add(muscleMesh);
        })();

        // ============================================================
        // UI INTERACTION
        // ============================================================

        // Build organ list
        const organListEl = document.getElementById('organ-list');
        const organVisibility = {};
        Object.keys(organInfo).forEach(id => {
            organVisibility[id] = true;
            const li = document.createElement('li');
            li.dataset.organId = id;

            const dot = document.createElement('span');
            dot.className = 'organ-dot';
            dot.style.background = organInfo[id].color;

            const name = document.createElement('span');
            name.textContent = organInfo[id].name;

            const toggle = document.createElement('span');
            toggle.className = 'organ-toggle on';
            toggle.addEventListener('click', (e) => {
                e.stopPropagation();
                organVisibility[id] = !organVisibility[id];
                toggle.classList.toggle('on', organVisibility[id]);
                if (organs[id]) {
                    organs[id].visible = organVisibility[id];
                }
            });

            li.appendChild(dot);
            li.appendChild(name);
            li.appendChild(toggle);
            li.addEventListener('click', () => selectOrgan(id));
            organListEl.appendChild(li);
        });

        function selectOrgan(id) {
            // Highlight in list
            document.querySelectorAll('.organ-list li').forEach(li => li.classList.remove('active'));
            const activeLi = document.querySelector(`[data-organ-id="${id}"]`);
            if (activeLi) activeLi.classList.add('active');

            // Show info
            const info = organInfo[id];
            if (info) {
                document.getElementById('info-title').textContent = info.name;
                document.getElementById('info-desc').textContent = info.desc;
                document.getElementById('info-panel').style.display = 'block';
            }

            // Animate camera toward organ
            if (organs[id]) {
                const target = new THREE.Vector3();
                if (organs[id].isMesh) {
                    organs[id].getWorldPosition(target);
                } else {
                    const box = new THREE.Box3().setFromObject(organs[id]);
                    box.getCenter(target);
                }
                animateCameraTo(target);
            }
        }

        function animateCameraTo(target) {
            const startTarget = controls.target.clone();
            const startPos = camera.position.clone();
            const endTarget = target.clone();
            const dir = new THREE.Vector3().subVectors(camera.position, controls.target).normalize();
            const endPos = target.clone().add(dir.multiplyScalar(8));
            const startTime = performance.now();
            const duration = 1000;

            function animStep(time) {
                const t = Math.min((time - startTime) / duration, 1);
                const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
                controls.target.lerpVectors(startTarget, endTarget, ease);
                camera.position.lerpVectors(startPos, endPos, ease);
                if (t < 1) requestAnimationFrame(animStep);
            }
            requestAnimationFrame(animStep);
        }

        // Skin / Muscle opacity sliders
        document.getElementById('skin-opacity').addEventListener('input', (e) => {
            const val = parseInt(e.target.value) / 100;
            document.getElementById('skin-opacity-val').textContent = e.target.value + '%';
            if (skinMesh) skinMesh.material.opacity = val;
        });
        document.getElementById('muscle-opacity').addEventListener('input', (e) => {
            const val = parseInt(e.target.value) / 100;
            document.getElementById('muscle-opacity-val').textContent = e.target.value + '%';
            if (muscleMesh) muscleMesh.material.opacity = val;
        });

        // View mode buttons
        document.querySelectorAll('[data-view]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('[data-view]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const view = btn.dataset.view;
                switch (view) {
                    case 'full':
                        animateCameraTo(new THREE.Vector3(0, 5, 0));
                        break;
                    case 'torso':
                        animateCameraTo(new THREE.Vector3(0, 6.5, 0));
                        break;
                    case 'head':
                        animateCameraTo(new THREE.Vector3(0, 10.5, 0));
                        break;
                }
            });
        });

        // Raycaster for clicking organs
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        renderer.domElement.addEventListener('click', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            // Get all meshes except skin and muscle
            const clickable = [];
            bodyGroup.traverse(child => {
                if (child.isMesh && child !== skinMesh && child !== muscleMesh && child.userData.organId) {
                    clickable.push(child);
                }
            });

            // Also check group children
            Object.entries(organs).forEach(([id, obj]) => {
                if (obj.isGroup) {
                    obj.traverse(child => {
                        if (child.isMesh) {
                            child.userData.organId = id;
                            if (!clickable.includes(child)) clickable.push(child);
                        }
                    });
                }
            });

            const intersects = raycaster.intersectObjects(clickable, false);
            if (intersects.length > 0) {
                const organId = intersects[0].object.userData.organId;
                if (organId && organInfo[organId]) {
                    selectOrgan(organId);
                }
            }
        });

        // Hover effect
        let hoveredOrgan = null;
        renderer.domElement.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const clickable = [];
            Object.entries(organs).forEach(([id, obj]) => {
                if (obj.isGroup) {
                    obj.traverse(child => {
                        if (child.isMesh) {
                            child.userData.organId = id;
                            clickable.push(child);
                        }
                    });
                } else if (obj.isMesh && obj !== skinMesh && obj !== muscleMesh) {
                    clickable.push(obj);
                }
            });

            const intersects = raycaster.intersectObjects(clickable, false);
            if (intersects.length > 0) {
                const organId = intersects[0].object.userData.organId;
                if (organId !== hoveredOrgan && organInfo[organId]) {
                    hoveredOrgan = organId;
                    renderer.domElement.style.cursor = 'pointer';
                }
            } else {
                hoveredOrgan = null;
                renderer.domElement.style.cursor = 'default';
            }
        });

        // ============================================================
        // ANIMATION LOOP
        // ============================================================
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsed = clock.getElapsedTime();

            // Subtle heart beating
            if (organs.heart) {
                const beat = 1 + Math.pow(Math.sin(elapsed * 4.5), 16) * 0.08;
                organs.heart.scale.set(beat, beat, beat);
            }

            // Subtle lung breathing
            if (organs.leftLung) {
                const breath = 1 + Math.sin(elapsed * 1.2) * 0.03;
                organs.leftLung.scale.set(breath, 1, breath);
            }
            if (organs.rightLung) {
                const breath = 1 + Math.sin(elapsed * 1.2) * 0.03;
                organs.rightLung.scale.set(breath, 1, breath);
            }

            // Diaphragm breathing sync
            if (organs.diaphragm) {
                const diaBreath = Math.sin(elapsed * 1.2) * 0.05;
                organs.diaphragm.position.y = 6.8 + diaBreath;
            }

            // Subtle body rotation when idle
            bodyGroup.rotation.y = Math.sin(elapsed * 0.15) * 0.05;

            controls.update();
            composer.render();
        }

        // ============================================================
        // LOADING & RESIZE
        // ============================================================
        const loadingFill = document.getElementById('loading-fill');
        let loadProgress = 0;
        const loadInterval = setInterval(() => {
            loadProgress += Math.random() * 15 + 5;
            if (loadProgress >= 100) {
                loadProgress = 100;
                clearInterval(loadInterval);
                setTimeout(() => {
                    document.getElementById('loading').classList.add('hidden');
                }, 300);
            }
            loadingFill.style.width = loadProgress + '%';
        }, 100);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
